# AgentX统一Docker Compose配置
# 支持通过环境变量控制不同部署模式：local/production/external

name: agentx

networks:
  agentx-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  rabbitmq-data:
    driver: local
  storage-data:
    driver: local
  gateway-logs:
    driver: local

services:
  # PostgreSQL数据库服务
  # 仅在非external模式下启动
  postgres:
    build:
      context: ..
      dockerfile: docker/postgres/Dockerfile
      args:
        POSTGRES_BASE_IMAGE: ${POSTGRES_BASE_IMAGE:-m.daocloud.io/docker.io/pgvector/pgvector:pg15}
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PG_JIEBA_GIT_URL: ${PG_JIEBA_GIT_URL:-https://github.com/jaiminpan/pg_jieba.git}
        PG_JIEBA_GIT_FALLBACK_URL: ${PG_JIEBA_GIT_FALLBACK_URL:-https://gitee.com/shawnyan/pg_jieba.git}
        CPPJIEBA_GIT_URL: ${CPPJIEBA_GIT_URL:-https://github.com/yanyiwu/cppjieba.git}
        CPPJIEBA_GIT_FALLBACK_URL: ${CPPJIEBA_GIT_FALLBACK_URL:-https://gitcode.com/mirrors/yanyiwu/cppjieba.git}
        LIMONP_GIT_URL: ${LIMONP_GIT_URL:-https://github.com/yanyiwu/limonp.git}
        LIMONP_GIT_FALLBACK_URL: ${LIMONP_GIT_FALLBACK_URL:-https://gitcode.com/mirrors/yanyiwu/limonp.git}
    image: ${POSTGRES_IMAGE:-agentx-postgres-jieba:local}
    container_name: agentx-postgres
    profiles:
      - local
      - production
    environment:
      POSTGRES_DB: ${DB_NAME:-agentx}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../docs/sql/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - agentx-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-agentx}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ消息队列服务
  rabbitmq:
    image: ${RABBITMQ_IMAGE:-m.daocloud.io/docker.io/library/rabbitmq:3.12-management-alpine}
    container_name: agentx-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - agentx-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # AgentX后端服务
  agentx-backend:
    user: "0:0"
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile${DOCKERFILE_SUFFIX:-}
      args:
        MAVEN_BUILDER_IMAGE: ${MAVEN_BUILDER_IMAGE:-m.daocloud.io/docker.io/library/maven:3.9-eclipse-temurin-17}
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-m.daocloud.io/docker.io/library/eclipse-temurin:17-jre-alpine}
        MAVEN_DEV_IMAGE: ${MAVEN_DEV_IMAGE:-m.daocloud.io/docker.io/library/maven:3.9-eclipse-temurin-17}
    container_name: agentx-backend
    environment:
      # 数据库配置
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-agentx}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      
      # Spring配置
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SHOW_SQL: ${SHOW_SQL:-true}
      
      # 默认用户配置
      AGENTX_ADMIN_EMAIL: ${AGENTX_ADMIN_EMAIL:-admin@agentx.ai}
      AGENTX_ADMIN_PASSWORD: ${AGENTX_ADMIN_PASSWORD:-admin123}
      AGENTX_ADMIN_NICKNAME: ${AGENTX_ADMIN_NICKNAME:-AgentX管理员}
      AGENTX_TEST_ENABLED: ${AGENTX_TEST_ENABLED:-true}
      AGENTX_TEST_EMAIL: ${AGENTX_TEST_EMAIL:-test@agentx.ai}
      AGENTX_TEST_PASSWORD: ${AGENTX_TEST_PASSWORD:-test123}
      
      # 消息队列配置
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      
      # 日志配置
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-info}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-debug}
      
      # 安全配置
      JWT_SECRET: ${JWT_SECRET:-default_jwt_secret_please_change_in_production}
      
      # 高可用网关配置
      HIGH_AVAILABILITY_ENABLED: ${HIGH_AVAILABILITY_ENABLED:-false}
      HIGH_AVAILABILITY_GATEWAY_URL: ${HIGH_AVAILABILITY_GATEWAY_URL:-http://api-gateway:8081}
      HIGH_AVAILABILITY_API_KEY: ${HIGH_AVAILABILITY_API_KEY:-default-api-key}
      
      # 支付配置
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-your_alipay_app_id}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-your_alipay_private_key}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-your_alipay_public_key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-your_stripe_secret_key}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-your_stripe_publishable_key}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-your_stripe_webhook_secret}
      
      # GitHub集成配置
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-agent-mcp-community}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-lucky-aeon}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-your_github_token}
      
      # 其他配置
      FILE_STORAGE_PATH: ${FILE_STORAGE_PATH:-/app/storage}
      AGENTX_CONTAINER_DEFAULT_MCP_IMAGE: ${AGENTX_CONTAINER_DEFAULT_MCP_IMAGE:-ghcr.io/lucky-aeon/mcp-gateway:latest}
      # 后端容器访问宿主机地址（用于连接审核容器映射端口）
      AGENTX_CONTAINER_HOST_ACCESS_ADDRESS: ${AGENTX_CONTAINER_HOST_ACCESS_ADDRESS:-host.docker.internal}
      # MCP网关部署/连接超时（工具安装慢时需要调大）
      MCP_GATEWAY_CONNECT_TIMEOUT: ${MCP_GATEWAY_CONNECT_TIMEOUT:-60000}
      MCP_GATEWAY_READ_TIMEOUT: ${MCP_GATEWAY_READ_TIMEOUT:-180000}
      # MCP SSE长连接超时（避免30秒空闲断开）
      CHAT_TOOLS_MCP_TRANSPORT_TIMEOUT_MS: ${CHAT_TOOLS_MCP_TRANSPORT_TIMEOUT_MS:-300000}
    volumes:
      - storage-data:/app/storage
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8088}:8088"
      - "${DEBUG_PORT:-5005}:5005"  # 调试端口（仅开发环境）
    networks:
      - agentx-network
    depends_on:
      postgres:
        condition: service_healthy
        required: false  # external模式不需要postgres
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # 开发环境暂时禁用健康检查以避免curl依赖
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f http://localhost:8088/api/health || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 60s

  # AgentX前端服务
  agentx-frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile${DOCKERFILE_SUFFIX:-}
      args:
        NODE_BUILDER_IMAGE: ${NODE_BUILDER_IMAGE:-m.daocloud.io/docker.io/library/node:18-alpine}
        NODE_RUNTIME_IMAGE: ${NODE_RUNTIME_IMAGE:-m.daocloud.io/docker.io/library/node:18-alpine}
        NODE_DEV_IMAGE: ${NODE_DEV_IMAGE:-m.daocloud.io/docker.io/library/node:18-alpine}
    container_name: agentx-frontend
    environment:
      # API配置
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-auto}
      NEXT_PUBLIC_BACKEND_PORT: ${BACKEND_PORT:-8088}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://agentx-backend:8088/api}
      
      # Next.js配置
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - agentx-network
    depends_on:
      - agentx-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# 开发模式配置（--profile dev）
  # 数据库管理工具（仅开发环境）
  adminer:
    image: ${ADMINER_IMAGE:-m.daocloud.io/docker.io/library/adminer:4-standalone}
    container_name: agentx-adminer
    profiles:
      - dev
    ports:
      - "8082:8080"
    networks:
      - agentx-network
    depends_on:
      - postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # API Premium Gateway 高可用网关服务
  api-gateway:
    image: my-api-gateway:latest
    container_name: agentx-api-gateway
    profiles:
      - local
      - production
    ports:
      - "8081:8081"
    volumes:
      - gateway-logs:/app/logs
    networks:
      - agentx-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
